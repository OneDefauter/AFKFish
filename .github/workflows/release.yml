name: Build And Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION="$(sed -n 's/^mod_version = //p' gradle.properties | head -n 1 | tr -d '\r')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build project
        run: ./gradlew build --no-daemon

      - name: Resolve release notes
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE=".github/release-notes/${VERSION}.md"

          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" release-notes.md
          else
            cat > release-notes.md <<EOF
            Automated release generated by GitHub Actions.

            Version: ${VERSION}
            Commit: ${{ github.sha }}
            EOF
          fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" build/libs/*.jar --clobber
            gh release edit "$TAG" --title "AFKFish $VERSION" --notes-file release-notes.md
          else
            gh release create "$TAG" build/libs/*.jar \
              --target "${GITHUB_SHA}" \
              --title "AFKFish $VERSION" \
              --notes-file release-notes.md
          fi
